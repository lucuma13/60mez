name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/checkout@v6
        with:
          repository: moergo-sc/zmk
          ref: refs/pull/36/head
          path: src
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-22.05
      - uses: cachix/cachix-action@v17
        with:
          name: moergo-glove80-zmk-dev
          skipPush: true
      - name: Build Go60 combined firmware
        run: nix-build config -o combined
      - name: Copy result out of nix store
#       run: cp combined/go60.uf2 go60.uf2  #this was the original command
        run: |
          # Extract all generated UF2 files to isolate the halves if needed
          if [ -d combined ]; then
            cp -v combined/*.uf2 . 2>/dev/null || cp -v combined/go60.uf2 .
          fi
      - name: Upload result
        uses: actions/upload-artifact@v7
        with:
          name: go60-firmware
          path: "*.uf2"